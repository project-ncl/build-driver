name: Mend CLI scan for Maven

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 22 * * 0"

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  security-events: write

jobs:
  build:
    uses: project-ncl/shared-github-actions/.github/workflows/maven-ci.yml@429a1085131890ddf95456ac2a7a8b0866dd78ad # main
    with:
      upload_artifacts: true

  call-mend-ci:
    uses: project-ncl/shared-github-actions/.github/workflows/mend-ci.yml@429a1085131890ddf95456ac2a7a8b0866dd78ad # main
    with:
      SCA: true
      SAST: true
    secrets:
      MEND_URL: ${{ secrets.MEND_URL }}
      MEND_USER_KEY: ${{ secrets.MEND_USER_KEY }}
      MEND_EMAIL: ${{ secrets.MEND_EMAIL }}
      MEND_ORGNAME: ${{ secrets.MEND_ORGNAME }}
      MEND_PRODUCTNAME: ${{ secrets.MEND_PRODUCTNAME }}
